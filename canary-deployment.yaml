apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-canary
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
      version: canary
  template:
    metadata:
      labels:
        app: my-app
        version: canary
    spec:
      containers:
      - name: my-app
        image: vyshnavipriya/my-app:latest
        ports:
        - containerPort: 3000
