name: CI-CD Pipeline (Staging + Approval + Prod)

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    # ✅ 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ 2. Setup Node
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # ✅ 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # ✅ 4. Build Docker image
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .

    # ✅ 5. Docker Login
    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    # ✅ 6. Push Docker image
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

    # 🔐 7. Setup SSH
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    # 🚀 8A. Deploy to STAGING
    - name: Deploy to Staging
      run: |
        ssh -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🚀 Connected to EC2 (STAGING)"

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "📡 Checking cluster..."
          sudo kubectl get nodes

          echo "📦 Deploying to STAGING..."
          sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n staging

          echo "⏳ Waiting for rollout (STAGING)..."
          sudo kubectl rollout status deployment/my-app -n staging

        EOF

    # 🛑 8B. Manual Approval
    - name: Wait for approval
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ github.TOKEN }}
        approvers: vyshnavipriya52-ux

    # 🚀 8C. Deploy to PRODUCTION
    - name: Deploy to Production
      run: |
        ssh -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🚀 Connected to EC2 (PRODUCTION)"

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "📦 Deploying to PRODUCTION..."
          sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

          echo "⏳ Waiting for rollout (PRODUCTION)..."
          sudo kubectl rollout status deployment/my-app

        EOF

    # 🔁 9. Rollback if failure
    - name: Rollback if failed
      if: failure()
      run: |
        ssh -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "⚠️ Rolling back deployment..."
          sudo kubectl rollout undo deployment/my-app

        EOF
