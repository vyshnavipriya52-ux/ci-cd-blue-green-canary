name: CI/CD Pipeline (Staging → Approval → Production)

on:
  push:
    branches:
      - main

jobs:

# 🔵 1. BUILD + TEST
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test


# 🐳 2. DOCKER BUILD + PUSH
  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}


# 🚀 3. DEPLOY TO STAGING
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to Staging
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "📦 Updating Deployment..."
          sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n staging

          echo "📊 Checking Pods..."
          sudo kubectl get pods -n staging

          echo "⏳ Waiting for pods to stabilize..."
          sleep 10

          echo "📊 Final Pod Status:"
          sudo kubectl get pods -n staging

          echo "🌐 Service Info:"
          sudo kubectl get svc -n staging

          echo "✅ Staging Deployment Completed"

        EOF


# 🔴 4. PRODUCTION DEPLOY (WITH APPROVAL)
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # 🔥 Requires manual approval

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to Production
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "🚀 Deploying to Production..."

          sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

          echo "📊 Checking Pods..."
          sudo kubectl get pods

          echo "⏳ Waiting..."
          sleep 10

          echo "📊 Final Pod Status:"
          sudo kubectl get pods

          echo "✅ Production Deployment Completed"

        EOF


# 🔁 5. ROLLBACK (IF FAILURE)
  rollback:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Rollback Deployment
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "⚠️ Rolling back deployment..."
          sudo kubectl rollout undo deployment/my-app

          echo "📊 Pod Status after rollback:"
          sudo kubectl get pods

        EOF
