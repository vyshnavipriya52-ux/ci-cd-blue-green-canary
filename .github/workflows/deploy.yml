name: Enterprise CI/CD Pipeline (Canary + Blue-Green)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

# 🔵 1. BUILD + TEST
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test


# 🐳 2. DOCKER BUILD + PUSH
  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/my-app:latest

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest


# 🚀 3. DEPLOY TO STAGING (BLUE BASE)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy Blue (Stable)
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "🔵 Updating BLUE deployment (stable)..."
          sudo kubectl set image deployment/my-app-blue my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n staging

          echo "📊 Blue Pods:"
          sudo kubectl get pods -n staging

          sleep 10

          echo "✅ Staging (Blue) ready"

        EOF


# 🐤 4. CANARY DEPLOYMENT (10%)
  deploy-canary:
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy Canary
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "🐤 Deploying CANARY (10%)..."

          sudo kubectl set image deployment/my-app-canary my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n staging

          echo "📊 Traffic Split:"
          echo "BLUE → 90% (9 replicas)"
          echo "CANARY → 10% (1 replica)"

          sudo kubectl get pods -n staging

          sleep 10

          echo "✅ Canary deployed"

        EOF


# 🔴 5. MANUAL APPROVAL (PRODUCTION)
  approval:
    runs-on: ubuntu-latest
    needs: deploy-canary
    environment: production

    steps:
    - name: Waiting for Approval
      run: echo "⏳ Waiting for manual approval..."


# 🟢 6. BLUE-GREEN SWITCH (PRODUCTION)
  deploy-production:
    runs-on: ubuntu-latest
    needs: approval

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Switch to GREEN
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "🟢 Scaling GREEN deployment..."
          sudo kubectl scale deployment my-app-green --replicas=5 -n staging

          echo "🔵 Scaling DOWN BLUE deployment..."
          sudo kubectl scale deployment my-app-blue --replicas=0 -n staging

           echo "📊 Checking Pods..."
           sudo kubectl get pods -n staging

           echo "⏳ Waiting 10 seconds..."
           sleep 10

           echo "🔍 Validating pods are running..."

           STATUS=$(sudo kubectl get pods -n staging --no-headers | grep -v Running || true)

           if [ -n "$STATUS" ]; then
             echo "❌ Some pods are not running!"
             sudo kubectl get pods -n staging
             exit 1
           fi

           echo "✅ All pods are running successfully"


# 🔁 7. ROLLBACK (IF FAILURE)
  rollback:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Rollback to BLUE
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "⚠️ Rolling back to BLUE..."

          sudo kubectl scale deployment my-app-blue --replicas=5 -n staging
          sudo kubectl scale deployment my-app-green --replicas=0 -n staging

          sudo kubectl get pods -n staging

          echo "✅ Rollback completed"

        EOF
