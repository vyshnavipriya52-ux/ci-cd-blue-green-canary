name: 🚀 Enterprise CI/CD Pipeline (Canary + Blue-Green)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:

# ================================
# 🔵 JOB 1: BUILD + TEST + SECURITY
# ================================
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Unit Tests
      run: npm test

    - name: Run Lint
      run: npm run lint || true

    # 🔐 Security Scan (Snyk)
    - name: Snyk Security Scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

# ================================
# 🐳 JOB 2: DOCKER BUILD + PUSH
# ================================
  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:latest .
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .

    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Push Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

# ================================
# 🧪 JOB 3: DEPLOY TO STAGING
# ================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to Staging
      run: |
        ssh -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "📦 Deploying to STAGING..."
          sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n staging

          sudo kubectl rollout status deployment/my-app -n staging

          echo "🧪 Running Smoke Test..."
          curl -f http://localhost:30007 || exit 1
        EOF

# ================================
# 🐤 JOB 4: CANARY DEPLOYMENT (10% → 50%)
# ================================
  canary-deploy:
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy Canary
      run: |
        ssh -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "🐤 Deploying Canary..."
          sudo kubectl apply -f canary-deployment.yaml

          echo "📊 Scaling Canary to 10%..."
          sudo kubectl scale deployment my-app-canary --replicas=1 -n staging

          sleep 20

          echo "📊 Scaling Canary to 50%..."
          sudo kubectl scale deployment my-app-canary --replicas=2 -n staging

        EOF

# ================================
# 🔴 JOB 5: PRODUCTION (APPROVAL REQUIRED)
# ================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: canary-deploy
    environment: production   # 🔥 Approval gate

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Blue-Green Switch
      run: |
        ssh -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "🟢 Deploying GREEN version..."
          sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n production

          sudo kubectl rollout status deployment/my-app -n production

          echo "🔁 Switching traffic to GREEN..."
          sudo kubectl patch service my-app-service -n production -p '{"spec":{"selector":{"app":"my-app"}}}'

        EOF

# ================================
# ⚠️ JOB 6: AUTO ROLLBACK
# ================================
  rollback:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Rollback Deployment
      run: |
        ssh -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

          echo "⚠️ Rolling back..."
          sudo kubectl rollout undo deployment/my-app -n production

        EOF
