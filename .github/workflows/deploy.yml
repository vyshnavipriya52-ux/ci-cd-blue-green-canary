name: 🚀 CI/CD Pipeline (Canary + Blue-Green)

on:
  push:
    branches:
      - main

jobs:

# =========================
# 🔵 BUILD + TEST
# =========================
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

# =========================
# 🐳 DOCKER BUILD + PUSH
# =========================
  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

# =========================
# 🧪 DEPLOY TO STAGING
# =========================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "📦 Updating Deployment..."
            sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n staging

            echo "⏳ Waiting for rollout..."
            sudo kubectl rollout status deployment/my-app -n staging --timeout=120s

            echo "✅ Staging deployment successful"
          EOF

# =========================
# 🐤 CANARY DEPLOYMENT
# =========================
  canary:
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Canary
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "🐤 Applying Canary..."
            sudo kubectl apply -f canary-deployment.yaml

            echo "📊 Scaling Canary..."
            sudo kubectl scale deployment my-app-canary --replicas=1 -n staging

            sleep 15

            sudo kubectl scale deployment my-app-canary --replicas=2 -n staging

            echo "✅ Canary deployment done"
          EOF

# =========================
# 🔴 PRODUCTION (APPROVAL)
# =========================
  production:
    runs-on: ubuntu-latest
    needs: canary
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "🟢 Deploying to Production..."
            sudo kubectl set image deployment/my-app my-app=${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} -n production

            sudo kubectl rollout status deployment/my-app -n production --timeout=120s

            echo "🚀 Production deployment successful"
          EOF

# =========================
# ⚠️ ROLLBACK
# =========================
  rollback:
    runs-on: ubuntu-latest
    needs: production
    if: failure()

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -tt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "⚠️ Rolling back..."
            sudo kubectl rollout undo deployment/my-app -n production
          EOF
